<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        body {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            background: #000;
            overflow: hidden;
            cursor: none;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #ff0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,0,0,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.15s ease;
            mix-blend-mode: difference;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,0,0,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255,0,0,0.1) 0%, transparent 50%),
                #000;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            opacity: 0.5;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .glitch-wrapper {
            position: relative;
            z-index: 10;
        }

        .name {
            font-size: clamp(80px, 15vw, 200px);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            position: relative;
            animation: glitchPulse 3s ease-in-out infinite;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 30px #ff0000,
                0 0 40px #ff0000,
                0 0 60px #ff0000,
                3px 3px 0 #ff0000,
                -3px -3px 0 #000;
        }

        .name::before {
            content: 'MANAS';
            position: absolute;
            top: 0;
            left: 0;
            color: #ff0000;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch1 2s infinite;
        }

        .name::after {
            content: 'MANAS';
            position: absolute;
            top: 0;
            left: 0;
            color: #ff0000;
            overflow: hidden;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            animation: glitch2 2.5s infinite;
        }

        @keyframes glitchPulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px #ff0000,
                    0 0 20px #ff0000,
                    0 0 30px #ff0000,
                    0 0 40px #ff0000,
                    3px 3px 0 #ff0000,
                    -3px -3px 0 #000;
            }
            50% { 
                text-shadow: 
                    0 0 20px #ff0000,
                    0 0 40px #ff0000,
                    0 0 60px #ff0000,
                    0 0 80px #ff0000,
                    5px 5px 0 #ff0000,
                    -5px -5px 0 #000;
            }
        }

        @keyframes glitch1 {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch2 {
            0% { transform: translate(0); }
            20% { transform: translate(5px, -5px); }
            40% { transform: translate(5px, 5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(-5px, 5px); }
            100% { transform: translate(0); }
        }

        .subtitle {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(16px, 2vw, 24px);
            color: #ff0000;
            letter-spacing: 12px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            animation: fadeFlicker 4s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes fadeFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ff0000;
            animation: particleFloat 10s linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,0,0,0.3);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .corner-lines {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            border-top: 3px solid #ff0000;
            border-left: 3px solid #ff0000;
            animation: cornerPulse 2s ease-in-out infinite;
        }

        .corner-lines::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 100px;
            height: 100px;
            border-bottom: 3px solid #ff0000;
            border-right: 3px solid #ff0000;
        }

        @keyframes cornerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .code-rain {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #ff0000;
            opacity: 0.1;
            animation: rainFall 8s linear infinite;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .enter-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: btnPulse 2s ease-in-out infinite;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: all 0.3s;
            z-index: -1;
        }

        .enter-btn:hover::before {
            left: 0;
        }

        .enter-btn:hover {
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        @keyframes btnPulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255,0,0,0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(255,0,0,0.8);
            }
        }

        @media (max-width: 768px) {
            .corner-lines {
                top: 20px;
                left: 20px;
                width: 60px;
                height: 60px;
            }

            .corner-lines::after {
                bottom: -60px;
                right: -60px;
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="container">
        <div class="grid-bg"></div>
        <div class="particles" id="particles"></div>
        <div class="scanline"></div>
        <div class="vignette"></div>
        <div class="corner-lines"></div>

        <div class="glitch-wrapper">
            <h1 class="name">MANAS</h1>
            <div class="subtitle">DEVELOPER • CS STUDENT • AI LEARNER</div>
        </div>

        <button class="enter-btn">ENTER</button>
    </div>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            }, 100);
        });

        // Create particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Create code rain
        const codeChars = '01αβγδεζηθικλμνξοπρστυφχψω';
        for (let i = 0; i < 20; i++) {
            const rain = document.createElement('div');
            rain.className = 'code-rain';
            rain.style.left = Math.random() * 100 + '%';
            rain.style.animationDelay = Math.random() * 8 + 's';
            rain.textContent = Array(20).fill(0).map(() => 
                codeChars[Math.floor(Math.random() * codeChars.length)]
            ).join('\n');
            particlesContainer.appendChild(rain);
        }

        // Enter button
        document.querySelector('.enter-btn').addEventListener('click', () => {
            document.body.style.transition = 'all 1s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                alert('Portfolio loading... (Add your next page here!)');
                document.body.style.opacity = '1';
            }, 1000);
        });

        // Button hover effect
        document.querySelector('.enter-btn').addEventListener('mouseenter', () => {
            cursor.style.width = '60px';
            cursor.style.height = '60px';
            cursor.style.background = 'rgba(255,0,0,0.2)';
        });

        document.querySelector('.enter-btn').addEventListener('mouseleave', () => {
            cursor.style.width = '20px';
            cursor.style.height = '20px';
            cursor.style.background = 'transparent';
        });
    </script>
</body>
</html>
