<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Blog Cards</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <h1 class="title">My Tools & Workflow</h1>

    <div class="card-container">

        <div class="card" data-color="red">
            <div class="icon">🍎</div>
            <h2>Apple</h2>
            <p>All my hardware is Apple. It's reliable and fits my ecosystem perfectly.</p>
        </div>

        <div class="card" data-color="blue">
            <div class="icon">🎨</div>
            <h2>Figma</h2>
            <p>My main design tool to prototype ideas fast and clean.</p>
        </div>

        <div class="card" data-color="purple">
            <div class="icon">⚡</div>
            <h2>Framer</h2>
            <p>I use Framer to turn concepts into real, working products.</p>
        </div>

    </div>

</body>
</html>
